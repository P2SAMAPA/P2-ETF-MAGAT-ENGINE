name: MAGAT Train and Predict

on:
  schedule:
    - cron: "0 21 * * 1-5"   # 21:00 UTC Mon-Fri (before DeePM at 22:30)
  workflow_dispatch:
    inputs:
      option:
        description: "Option to run (A, B, or both)"
        required: false
        default: "both"

jobs:
  magat-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train fixed split
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: |
          OPTION="${{ github.event.inputs.option || 'both' }}"
          python train.py --option $OPTION

      - name: Train shrinking windows
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: |
          OPTION="${{ github.event.inputs.option || 'both' }}"
          python train_windows.py --option $OPTION

      - name: Generate signals
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_MODELS_REPO:  ${{ secrets.HF_MODELS_REPO }}
        run: |
          OPTION="${{ github.event.inputs.option || 'both' }}"
          python predict.py --option $OPTION

      - name: Upload to HuggingFace
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_MODELS_REPO: ${{ secrets.HF_MODELS_REPO }}
        run: python upload_models.py

      - name: Done
        run: echo "MAGAT pipeline complete."
